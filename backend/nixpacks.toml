[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.fileinfo", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "php artisan migrate --force"
]

[start]
cmd = "sh -c 'php artisan serve --host=0.0.0.0 --port=$PORT'"
